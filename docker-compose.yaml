version: '3.9'

services:
  db:
    image: postgres:18-alpine
    container_name: rental-db
    ports:
      - "${POSTGRES_PORT}:5432"
    env_file:
      - env/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

volumes:
  postgres_data: